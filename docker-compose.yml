services:
  redis:
    init: true
    image: redis
    ports:
      - 6379
  mysql:
    init: true
    image: mysql
    ports:
      - 3306
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_DATABASE=testdb
    volumes:
      - ./testdata/schema:/docker-entrypoint-initdb.d
  bigquery:
    init: true
    image: ghcr.io/goccy/bigquery-emulator
    platform: linux/amd64
    command: |
      --project=test
    ports:
      - 9050
  redis-cluster-node-1:
    init: true
    image: redis
    command: >
      redis-server --port 7001 --cluster-enabled yes --cluster-node-timeout 5000
      --cluster-config-file nodes.conf --appendonly yes
      --cluster-announce-ip redis-cluster-node-1 --cluster-announce-port 7001
    ports:
      - "7001:7001"
  redis-cluster-node-2:
    init: true
    image: redis
    command: >
      redis-server --port 7002 --cluster-enabled yes --cluster-node-timeout 5000
      --cluster-config-file nodes.conf --appendonly yes
      --cluster-announce-ip redis-cluster-node-2 --cluster-announce-port 7002
    ports:
      - "7002:7002"
  redis-cluster-node-3:
    init: true
    image: redis
    command: >
      redis-server --port 7003 --cluster-enabled yes --cluster-node-timeout 5000
      --cluster-config-file nodes.conf --appendonly yes
      --cluster-announce-ip redis-cluster-node-3 --cluster-announce-port 7003
    ports:
      - "7003:7003"
  redis-cluster-init:
    image: redis
    command: >
      sh -c "sleep 3 && redis-cli --cluster create
      redis-cluster-node-1:7001 redis-cluster-node-2:7002 redis-cluster-node-3:7003
      --cluster-replicas 0 --cluster-yes"
    depends_on:
      - redis-cluster-node-1
      - redis-cluster-node-2
      - redis-cluster-node-3
    restart: "no"
